# =============================================================
# ClassOS — Docker Compose
# Orchestrates all services: backend, frontend, db, nginx
# =============================================================


services:
  # ----- PostgreSQL Database -----
  db:
    image: postgres:16-alpine
    container_name: classos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-classos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-classos_secret}
      POSTGRES_DB: ${POSTGRES_DB:-classos_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-classos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classos-net

  # ----- FastAPI Backend -----
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: classos-backend
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-classos}:${POSTGRES_PASSWORD:-classos_secret}@db:5432/${POSTGRES_DB:-classos_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-to-a-random-jwt-secret}
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-random-64-char-string}
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      # Camera 0 — entry/face recognition camera (CAM/DISP 0 on RPi5)
      CAMERA_DEVICE_INDEX: ${CAMERA_DEVICE_INDEX:-42}
      CAMERA_1_DEVICE_INDEX: ${CAMERA_1_DEVICE_INDEX:-43}
      FINGERPRINT_MOCK_MODE: ${FINGERPRINT_MOCK_MODE:-true}
      # LCD display settings
      LCD_ENABLED: ${LCD_ENABLED:-true}
      LCD_I2C_ADDRESS: ${LCD_I2C_ADDRESS:-0x27}
      LCD_I2C_BUS: ${LCD_I2C_BUS:-1}
      # AI thresholds
      FACE_CONFIDENCE_AUTO: 0.70
      FACE_CONFIDENCE_FINGERPRINT: 0.30
    volumes:
      - face_data:/app/data/faces
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # ── Hardware device access ──────────────────────────────────────────────
    # Raspberry Pi hardware device mappings.
    # Use `ls /dev/video*` and `i2cdetect -y 1` to confirm indices.
    devices:
      - /dev/video42:/dev/video42     # Camera 0 — v4l2loopback virtual device (Attendance)
      - /dev/video43:/dev/video43     # Camera 1 — v4l2loopback virtual device (Headcount)
      - /dev/ttyAMA0:/dev/ttyAMA0     # R307 fingerprint sensor (UART0 on Pi 5)
      - /dev/i2c-1:/dev/i2c-1         # I2C bus for 20x4 LCD display
      - /dev/gpiochip0:/dev/gpiochip0
      - /dev/gpiochip1:/dev/gpiochip1
      - /dev/gpiochip2:/dev/gpiochip2
      - /dev/gpiochip3:/dev/gpiochip3
      - /dev/gpiochip4:/dev/gpiochip4 # Raspberry Pi 5 GPIO header chip
    privileged: true
    networks:
      - classos-net

  # ----- React Frontend -----
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: classos-frontend
    restart: unless-stopped
    networks:
      - classos-net

  # ----- Nginx Reverse Proxy -----
  nginx:
    image: nginx:alpine
    container_name: classos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - classos-net

volumes:
  pgdata:
    driver: local
  face_data:
    driver: local

networks:
  classos-net:
    driver: bridge
